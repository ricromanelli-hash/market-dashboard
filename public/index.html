<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="stage">
    <header class="topbar">
      <div>
        <h1>Market Dashboard</h1>
        <p class="subtitle">Cotações via Yahoo Finance · Juros via BCB (SGS) · Tesouro via Tesouro Transparente · Notícias via InfoMoney &amp; Money Times · atualiza a cada 30s</p>
      </div>
      <div class="topbar-actions">
        <span id="updatedAt" class="updated-at">Atualizado às —</span>
        <button id="refreshBtn">↻ Atualizar</button>
      </div>
    </header>
    <section id="calWidget" class="cal-band"></section>
    <!-- widget de taxas de juros: fica fora do #grid para não recarregar no refresh,
         e é sobreposto ao slot logo abaixo do card de Commodities -->
    <section id="ratesWidget" class="rates-band"></section>
    <div id="content">
      <main id="grid" class="grid">
        <p class="loading">Carregando dados…</p>
      </main>
      <!-- painel lateral usado só no modo TV: Agenda IBGE + calendário em tamanho cheio -->
      <aside id="tvSide"></aside>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
